services:
    postgres:
        image: postgres:17.0
        env_file:
            - .env
        ports:
            - 5432:5432
        volumes:
            - dados:/var/lib/postgresql/data

    redis:
        image: redis:alpine
        ports:
            - 6379:6379
        volumes:
            - redis_data:/data

    evolution-api:
        image: atendai/evolution-api:v2.2.1
        ports:
            - 8080:8080
        env_file:
            - .env
        depends_on:
            - postgres
            - redis
        volumes:
            - evolution_instances:/evolution/instances
            - evolution_store:/evolution/store

volumes:
    dados:
    redis_data:
    evolution_instances:
    evolution_store: